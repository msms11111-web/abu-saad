<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>معرض الأعمال · Gallery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  /* ===== أساسيات مستخرجة من لوحة أبو سعد — عدّلها لتناسب الموقع الجديد ===== */
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Tajawal',sans-serif; background:#141312; min-height:100vh; padding:24px 16px; display:flex; align-items:flex-start; justify-content:center; }
  #gallery { width:100%; max-width:560px; border-radius:22px; }

  #gallery { background:radial-gradient(130% 120% at 100% -20%,rgba(201,169,106,0.06),transparent 44%),repeating-linear-gradient(94deg,rgba(255,240,210,0.015) 0 1px,transparent 1px 5px),linear-gradient(158deg,#272320,#211E1B 52%,#191715); border:1px solid rgba(201,169,106,0.12); box-shadow:inset 0 1px 0 rgba(255,238,200,0.05),0 20px 46px -30px rgba(0,0,0,0.75); padding:26px; }
  #gallery .head { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:14px; }
  #gallery .title { font-size:18px; font-weight:700; color:#F1EEE6; }
  #gallery .label-en { font-family:'Space Mono',monospace; font-size:11px; color:#9A9488; }
  #gallery-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; }
  .gallery-slot { position:relative; aspect-ratio:1; width:100%; min-width:0; overflow:hidden; border-radius:14px; background:rgba(237,233,224,0.04); border:1.5px dashed rgba(201,169,106,0.3); display:flex; align-items:center; justify-content:center; cursor:pointer; text-align:center; color:#7C766A; font-size:12px; padding:8px; transition:border-color .2s ease, background .2s ease; }
  .gallery-slot.drag-over { border-color:#C9A96A; background:rgba(201,169,106,0.1); }
  .gallery-slot img { width:100%; height:100%; object-fit:cover; display:block; }
  .gallery-slot .remove-btn { position:absolute; top:6px; left:6px; width:24px; height:24px; border-radius:8px; background:rgba(20,19,18,0.75); color:#EDE9E0; display:none; align-items:center; justify-content:center; font-size:14px; cursor:pointer; }
  .gallery-slot.filled:hover .remove-btn { display:flex; }
  
  /* Lightbox */
  #lightbox { position:fixed; inset:0; background:rgba(0,0,0,0.92); z-index:9999; display:none; align-items:center; justify-content:center; cursor:pointer; }
  #lightbox img { max-width:90%; max-height:90%; border-radius:12px; box-shadow:0 0 40px rgba(0,0,0,0.5); }
</style>
</head>
<body>

      <div id="gallery" class="card">
        <div class="head">
          <div class="title">معرض الأعمال</div>
          <div class="label-en">Gallery</div>
        </div>
        <div id="gallery-grid"></div>
      </div>

<!-- Lightbox Modal -->
<div id="lightbox">
  <img id="lightbox-img" alt="View Large" decoding="async">
</div>

<script>
(function () {
  "use strict";

  var GALLERY_KEY = "abusaad_gallery_v1";
  var GALLERY_SLOTS = 4;

  // ---------- Gallery ----------
  var galleryLabels = ["مشروع ١ — اسحب صورة", "مشروع ٢ — اسحب صورة", "مشروع ٣ — اسحب صورة", "مشروع ٤ — اسحب صورة"];

  function loadGallery() {
    try {
      var raw = localStorage.getItem(GALLERY_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return {};
  }
  function saveGallery(gallery) {
    try { localStorage.setItem(GALLERY_KEY, JSON.stringify(gallery)); } catch (e) {}
  }

  function resizeImage(file, maxDim, callback) {
    var reader = new FileReader();
    reader.onload = function (e) {
      var img = new Image();
      img.onload = function () {
        var w = img.width, h = img.height;
        var scale = Math.min(1, maxDim / Math.max(w, h));
        var canvas = document.createElement("canvas");
        canvas.width = Math.round(w * scale);
        canvas.height = Math.round(h * scale);
        var ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        callback(canvas.toDataURL("image/jpeg", 0.85));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  function renderGallery() {
    var gallery = loadGallery();
    var grid = document.getElementById("gallery-grid");
    grid.innerHTML = "";

    for (var i = 0; i < GALLERY_SLOTS; i++) {
      (function (idx) {
        var key = "slot" + idx;
        var slot = document.createElement("div");
        slot.className = "gallery-slot";

        var fileInput = document.createElement("input");
        fileInput.type = "file";
        fileInput.accept = "image/png,image/jpeg,image/webp";
        fileInput.style.display = "none";

        function setImage(dataUrl) {
          gallery[key] = dataUrl;
          saveGallery(gallery);
          renderGallery();
        }
        function clearImage() {
          delete gallery[key];
          saveGallery(gallery);
          renderGallery();
        }
        function handleFile(file) {
          if (!file || file.type.indexOf("image/") !== 0) return;
          resizeImage(file, 1200, setImage);
        }

        if (gallery[key]) {
          slot.classList.add("filled");
          var img = document.createElement("img");
          img.loading = "lazy";
          img.decoding = "async";
          img.src = gallery[key];
          slot.appendChild(img);

          var removeBtn = document.createElement("div");
          removeBtn.className = "remove-btn";
          removeBtn.textContent = "×";
          removeBtn.addEventListener("click", function (e) { e.stopPropagation(); clearImage(); });
          slot.appendChild(removeBtn);
          
          slot.addEventListener("click", function (e) {
            e.stopPropagation();
            var lb = document.getElementById("lightbox");
            var lbImg = document.getElementById("lightbox-img");
            lbImg.src = gallery[key];
            lb.style.display = "flex";
          });
        } else {
          slot.textContent = galleryLabels[idx];
          slot.addEventListener("click", function () { fileInput.click(); });
        }
        fileInput.addEventListener("change", function () {
          if (fileInput.files && fileInput.files[0]) handleFile(fileInput.files[0]);
        });
        slot.addEventListener("dragover", function (e) { e.preventDefault(); slot.classList.add("drag-over"); });
        slot.addEventListener("dragleave", function () { slot.classList.remove("drag-over"); });
        slot.addEventListener("drop", function (e) {
          e.preventDefault();
          slot.classList.remove("drag-over");
          if (e.dataTransfer.files && e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
        });

        slot.appendChild(fileInput);
        grid.appendChild(slot);
      })(i);
    }
  }

  document.getElementById("lightbox").addEventListener("click", function () {
    this.style.display = "none";
    document.body.style.overflow = "auto";
  });

  renderGallery();
})();
</script>
</body>
</html>
