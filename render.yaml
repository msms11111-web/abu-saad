services:
  - type: web
    name: saudi-essence-api
    runtime: node
    plan: free
    rootDir: server
    # --include=dev is required: NODE_ENV=production would otherwise skip
    # devDependencies (typescript, @types/*) that the build needs
    buildCommand: npm install --include=dev && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false # set this in the Render dashboard (MongoDB Atlas connection string)
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 7d
      - key: CLIENT_URL
        value: https://saudi-essence-shop.onrender.com,http://localhost:5173
      - key: SETUP_RESET_KEY
        value: reset-saudi-essence-2026

  - type: web
    name: saudi-essence-shop
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://saudi-essence-api.onrender.com/api
    routes:
      # SPA fallback: let React Router handle all paths
      - type: rewrite
        source: /*
        destination: /index.html
